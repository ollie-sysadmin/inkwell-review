<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../preview/_card.css">
<style>
  html,body { background: #2a2a2a; }
  .stage { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
  .lbl { color: #ddd; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  .tw {
    width: 600px; height: 338px;
    background: var(--paper-yellow); color: var(--photocopy-black);
    padding: 24px 28px; box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: space-between;
    border: 4px solid var(--photocopy-black);
  }
  .k {
    display: flex; justify-content: space-between;
    font-family: var(--font-display); font-weight: 800;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    padding-bottom: 8px; border-bottom: 1.5px solid var(--photocopy-black);
  }
  .q {
    font-family: var(--font-display); font-weight: 800;
    font-size: 26px; line-height: 1.1; letter-spacing: -0.015em;
    margin: 8px 0 0; max-width: 28ch;
  }
  .q .hl {
    background: var(--photocopy-black); color: var(--paper-yellow);
    padding: 0 0.2em 0.06em;
    box-decoration-break: clone; -webkit-box-decoration-break: clone;
  }
  .foot {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-top: 10px; border-top: 1.5px solid var(--photocopy-black);
  }
  .wm { font-family: var(--font-wordmark); font-weight: 400; font-size: 18px; letter-spacing: -0.01em; }
  .wm em { font-style: italic; }
  .attrib { font-family: var(--font-wordmark); font-style: italic; font-size: 13px; }
</style></head>
<body>
<div class="stage">
  <div class="lbl">X / Twitter · 1200×675 (shown 600)</div>
  <div class="tw">
    <div class="k"><span>Voice · Issue 034</span><span>inkwellreview.com</span></div>
    <p class="q">The <span class="hl">median</span> is a quieter politician than the mean — but it has been winning elections for a decade.</p>
    <div class="foot">
      <span class="attrib">— Ollie, on the dignity of the boring average</span>
      <span class="wm">Inkwell <em>Review</em></span>
    </div>
  </div>
</div>
</body></html>
