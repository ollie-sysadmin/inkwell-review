<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../preview/_card.css">
<style>
  html,body { background: #2a2a2a; }
  .stage { padding: 24px; display: flex; flex-direction: column; gap: 20px; align-items: flex-start; }
  .lbl { color: #ddd; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  .ig {
    width: 540px; height: 540px;
    background: var(--paper-blue); color: var(--photocopy-black);
    padding: 36px 40px; box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
    border: 4px solid var(--photocopy-black);
  }
  .rail {
    display: flex; justify-content: space-between;
    font-family: var(--font-display); font-weight: 800;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    padding-bottom: 12px; border-bottom: 1.5px solid var(--photocopy-black);
  }
  .body { display: flex; flex-direction: column; gap: 12px; }
  .stat {
    font-family: var(--font-display); font-weight: 800;
    font-size: 188px; line-height: 0.82;
    letter-spacing: -0.04em; font-variant-numeric: tabular-nums;
    margin: 0;
  }
  .stat .unit { font-family: var(--font-wordmark); font-weight: 400; font-style: italic; font-size: 70px; letter-spacing: -0.01em; }
  .sub {
    font-family: var(--font-display); font-weight: 800;
    font-size: 22px; line-height: 1.1; letter-spacing: -0.01em;
    max-width: 22ch; margin: 0;
  }
  .sub .hl {
    background: var(--photocopy-black); color: var(--paper-blue);
    padding: 0 0.2em 0.08em;
    box-decoration-break: clone; -webkit-box-decoration-break: clone;
  }
  .foot {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-top: 12px; border-top: 1.5px solid var(--photocopy-black);
  }
  .wm {
    font-family: var(--font-wordmark); font-weight: 400; font-size: 22px;
    line-height: 0.9; letter-spacing: -0.01em;
  }
  .wm em { font-style: italic; }
  .url {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em;
  }
</style></head>
<body>
<div class="stage">
  <div class="lbl">Instagram · 1080×1080 (shown 540)</div>
  <div class="ig">
    <div class="rail">
      <span>Fig. 02 · Issue 034</span>
      <span>Data</span>
    </div>
    <div class="body">
      <div class="stat">−6.5<span class="unit">min</span></div>
      <p class="sub">The <span class="hl">median</span> commute shrank while the mean stood still.</p>
    </div>
    <div class="foot">
      <div class="wm">Inkwell <em>Review</em></div>
      <span class="url">inkwellreview.com · OECD-14, 2014→2024</span>
    </div>
  </div>
</div>
</body></html>
