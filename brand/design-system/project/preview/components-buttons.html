<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 32px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .k { flex: 1 0 100%; }
  .btn { font-family: var(--font-display); font-weight: 800; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 22px; border: 3px solid var(--photocopy-black); background: var(--photocopy-black); color: var(--photocopy-white); cursor: pointer; border-radius: 0; line-height: 1; }
  .btn.ghost { background: var(--photocopy-white); color: var(--photocopy-black); }
  .btn.on-paper { background: var(--paper-yellow); color: var(--photocopy-black); border-color: var(--photocopy-black); }
  .btn:hover { transform: translate(-2px,-2px); box-shadow: 4px 4px 0 var(--photocopy-black); }
  .btn.ghost:hover { background: var(--paper-pink); }
  .btn.sm { padding: 10px 16px; font-size: 11px; }
</style></head>
<body><div class="card">
  <div class="k"><div class="card__kicker">Buttons — three ranks, hard shadow on hover</div></div>
  <button class="btn">Subscribe</button>
  <button class="btn ghost">Read the issue</button>
  <button class="btn on-paper">Request an invite</button>
  <button class="btn sm">Share</button>
  <button class="btn ghost sm">Cancel</button>
</div></body></html>
