<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 32px; }
  .row { display: grid; grid-template-columns: 90px 1fr 90px; gap: 12px; align-items: baseline; padding: 7px 0; border-bottom: 1px solid var(--border); font-family: var(--font-body); }
  .row:last-child { border-bottom: 0; }
  .nm { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; opacity: 0.7; }
  .sm { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em; opacity: 0.6; text-align: right; }
  .s { font-family: var(--font-display); color: var(--photocopy-black); line-height: 1; letter-spacing: -0.01em; }
</style></head>
<body><div class="card">
  <div class="card__kicker">Type scale</div>
  <div class="row"><div class="nm">FS-5XL</div><div class="s" style="font-size:88px; font-weight:800">Inkwell</div><div class="sm">128 · Masthead</div></div>
  <div class="row"><div class="nm">FS-3XL</div><div class="s" style="font-size:60px; font-weight:800">Headline</div><div class="sm">60 · Article</div></div>
  <div class="row"><div class="nm">FS-2XL</div><div class="s" style="font-size:40px; font-weight:700">Section heading</div><div class="sm">40</div></div>
  <div class="row"><div class="nm">FS-XL</div><div class="s" style="font-size:28px; font-weight:700">Chart title</div><div class="sm">28</div></div>
  <div class="row"><div class="nm">FS-LG</div><div class="s" style="font-size:20px; font-style:italic; font-weight:400">Standfirst</div><div class="sm">20 · Italic</div></div>
  <div class="row"><div class="nm">FS-BASE</div><div class="s" style="font-size:17px; font-weight:400; font-family:var(--font-body)">Body. The median commute fell.</div><div class="sm">17</div></div>
  <div class="row"><div class="nm">FS-SM</div><div class="s" style="font-size:14px; font-weight:500; font-family:var(--font-body)">Caption / meta</div><div class="sm">14</div></div>
  <div class="row"><div class="nm">FS-XS</div><div class="s" style="font-size:12px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase">Kicker · Section</div><div class="sm">12</div></div>
</div></body></html>
